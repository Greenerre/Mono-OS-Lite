name: Feature Request
description: Suggest a product or demo improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or judge problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk area
      options:
        - UI/demo clarity
        - Intent pipeline
        - Memory model
        - Risk/approval gates
        - Documentation
        - Build/release
    validations:
      required: true
